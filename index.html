<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>币安行情分析仪</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0e11; color: #e2e8f0; font-family: 'Courier New', monospace; padding: 16px; min-height: 100vh; }
  .header { border-bottom: 1px solid #1e2329; padding-bottom: 14px; margin-bottom: 18px; }
  .header h1 { color: #f0b90b; font-size: 17px; letter-spacing: 2px; }
  .header p { color: #5a6470; font-size: 11px; margin-top: 4px; }
  .label { font-size: 11px; color: #5a6470; letter-spacing: 1px; margin-bottom: 10px; }
  .coins { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .coin-btn { padding: 6px 14px; border: 1px solid #2b3139; border-radius: 4px; background: transparent; color: #5a6470; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
  .coin-btn.active { border-color: #f0b90b; background: rgba(240,185,11,0.1); color: #f0b90b; }
  .actions { display: flex; gap: 10px; margin-bottom: 16px; }
  .btn { padding: 10px 18px; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-secondary { background: #1e2329; border: 1px solid #2b3139; color: #e2e8f0; }
  .btn-primary { background: #f0b90b; color: #0b0e11; font-weight: bold; }
  .btn:disabled { background: #2b3139; color: #5a6470; cursor: not-allowed; }
  .status { font-size: 12px; color: #5a6470; padding: 8px 12px; background: #1e2329; border-left: 2px solid #f0b90b; border-radius: 4px; margin-bottom: 16px; }
  .tickers { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 18px; }
  .ticker-card { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 12px; }
  .ticker-label { color: #f0b90b; font-size: 13px; font-weight: bold; }
  .ticker-name { color: #5a6470; font-size: 11px; }
  .ticker-price { font-size: 16px; font-weight: bold; margin: 6px 0 4px; }
  .ticker-change { font-size: 13px; }
  .ticker-range { font-size: 10px; color: #5a6470; margin-top: 6px; }
  .up { color: #0ecb81; }
  .down { color: #f6465d; }
  .analysis-box { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 16px; }
  .analysis-title { font-size: 11px; color: #f0b90b; letter-spacing: 1px; margin-bottom: 12px; }
  .analysis-body { font-size: 14px; line-height: 1.8; color: #c9d1d9; white-space: pre-wrap; }
  .analysis-footer { font-size: 10px; color: #5a6470; margin-top: 12px; border-top: 1px solid #2b3139; padding-top: 10px; }
  .api-section { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 14px; margin-bottom: 18px; }
  .api-section input { width: 100%; background: #0b0e11; border: 1px solid #2b3139; border-radius: 4px; padding: 8px 10px; color: #e2e8f0; font-family: inherit; font-size: 13px; margin-top: 8px; }
  .api-hint { font-size: 11px; color: #5a6470; margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>◈ BINANCE 行情分析仪</h1>
  <p>实时数据 · Claude AI解读 · 新手友好</p>
</div>

<!-- API Key 输入 -->
<div class="api-section">
  <div class="label">CLAUDE API KEY（分析功能需要）</div>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <div class="api-hint">Key只存在本页面，不会上传任何服务器。从 console.anthropic.com 获取。</div>
</div>

<!-- 币种选择 -->
<div class="label">选择要分析的币种</div>
<div class="coins" id="coinBtns"></div>

<!-- 操作按钮 -->
<div class="actions">
  <button class="btn btn-secondary" id="fetchBtn" onclick="fetchData()">① 读取行情数据</button>
  <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()" disabled>② 开始分析</button>
</div>

<!-- 状态 -->
<div class="status" id="status" style="display:none"></div>

<!-- 行情卡片 -->
<div class="tickers" id="tickers"></div>

<!-- 分析结果 -->
<div class="analysis-box" id="analysisBox" style="display:none">
  <div class="analysis-title">◈ CLAUDE 市场分析</div>
  <div class="analysis-body" id="analysisBody"></div>
  <div class="analysis-footer">⚠️ 仅供学习参考，不构成投资建议。</div>
</div>

<script>
const COINS = [
  { symbol: "BTCUSDT", label: "BTC", name: "比特币" },
  { symbol: "ETHUSDT", label: "ETH", name: "以太坊" },
  { symbol: "BNBUSDT", label: "BNB", name: "币安币" },
  { symbol: "SOLUSDT", label: "SOL", name: "Solana" },
  { symbol: "XRPUSDT", label: "XRP", name: "瑞波币" },
  { symbol: "DOGEUSDT", label: "DOGE", name: "狗狗币" },
];

let selected = ["BTCUSDT", "ETHUSDT", "BNBUSDT"];
let tickers = [];
let klines = {};
let fetched = false;

// 渲染币种按钮
const btnsEl = document.getElementById("coinBtns");
COINS.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "coin-btn" + (selected.includes(c.symbol) ? " active" : "");
  btn.textContent = c.label;
  btn.onclick = () => {
    if (selected.includes(c.symbol)) {
      selected = selected.filter(s => s !== c.symbol);
      btn.classList.remove("active");
    } else {
      selected.push(c.symbol);
      btn.classList.add("active");
    }
  };
  btnsEl.appendChild(btn);
});

function setStatus(msg) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

function fmt(n, d = 2) {
  return Number(n).toLocaleString("zh-CN", { minimumFractionDigits: d, maximumFractionDigits: d });
}
function pct(n) {
  return (Number(n) >= 0 ? "+" : "") + Number(n).toFixed(2) + "%";
}

async function fetchData() {
  if (selected.length === 0) return;
  fetched = false;
  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("tickers").innerHTML = "";
  document.getElementById("analysisBox").style.display = "none";
  setStatus("正在从币安读取行情数据...");

  try {
    const symsParam = encodeURIComponent(JSON.stringify(selected));
    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbols=${symsParam}`);
    tickers = await res.json();

    setStatus("正在读取K线数据...");
    klines = {};
    await Promise.all(selected.map(async sym => {
      const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=1d&limit=7`);
      const data = await r.json();
      klines[sym] = data.map(k => ({
        date: new Date(k[0]).toLocaleDateString("zh-CN"),
        open: Number(k[1]).toFixed(2),
        high: Number(k[2]).toFixed(2),
        low: Number(k[3]).toFixed(2),
        close: Number(k[4]).toFixed(2),
        vol: Number(k[5]).toFixed(2),
      }));
    }));

    // 渲染行情卡片
    const tickersEl = document.getElementById("tickers");
    tickers.forEach(t => {
      const coin = COINS.find(c => c.symbol === t.symbol);
      const isUp = Number(t.priceChangePercent) >= 0;
      tickersEl.innerHTML += `
        <div class="ticker-card">
          <div style="display:flex;justify-content:space-between">
            <span class="ticker-label">${coin?.label}</span>
            <span class="ticker-name">${coin?.name}</span>
          </div>
          <div class="ticker-price">${fmt(t.lastPrice)}</div>
          <div class="ticker-change ${isUp ? 'up' : 'down'}">${pct(t.priceChangePercent)}</div>
          <div class="ticker-range">高 ${fmt(t.highPrice)} · 低 ${fmt(t.lowPrice)}</div>
        </div>`;
    });

    fetched = true;
    document.getElementById("analyzeBtn").disabled = false;
    setStatus("数据读取完成，点击「开始分析」让Claude解读");
  } catch (e) {
    setStatus("数据读取失败，请检查网络或VPN");
  }
}

async function analyze() {
  const apiKey = document.getElementById("apiKey").value.trim();
  if (!apiKey) { setStatus("请先填入Claude API Key"); return; }
  if (!fetched) return;

  document.getElementById("analyzeBtn").disabled = true;
  document.getElementById("analysisBox").style.display = "none";
  setStatus("Claude正在分析中...");

  const dataText = tickers.map(t => {
    const coin = COINS.find(c => c.symbol === t.symbol);
    const k = klines[t.symbol] || [];
    return `【${coin?.name}（${coin?.label}）】
当前价格：${fmt(t.lastPrice)} USDT
24小时涨跌：${pct(t.priceChangePercent)}
24小时最高：${fmt(t.highPrice)}
24小时最低：${fmt(t.lowPrice)}
24小时成交量：${fmt(t.volume, 0)} ${coin?.label}
近7日K线：
${k.map(d => `  ${d.date} 开${d.open} 高${d.high} 低${d.low} 收${d.close}`).join("\n")}`;
  }).join("\n\n");

  const prompt = `你是加密货币市场分析助手，以下是币安实时数据，请用简洁中文分析：

${dataText}

请分析：
1. 整体市场情绪
2. 各币种当前状态（强势/弱势/震荡）
3. 近7日趋势判断
4. 值得关注的异常信号
5. 新手操作建议1-2条

语气简洁，不要废话。`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || "").join("") || "分析失败";
    document.getElementById("analysisBody").textContent = text;
    document.getElementById("analysisBox").style.display = "block";
    setStatus("分析完成");
  } catch (e) {
    setStatus("分析请求失败，请重试");
  }
  document.getElementById("analyzeBtn").disabled = false;
}
</script>
</body>
</html>
