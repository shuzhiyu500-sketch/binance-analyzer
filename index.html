  .btn-secondary { background: #1e2329; border: 1px solid #2b3139; color: #e2e8f0; }
  .btn-primary { background: #f0b90b; color: #0b0e11; font-weight: bold; }
  .btn:disabled { background: #2b3139; color: #5a6470; cursor: not-allowed; }
  .status { font-size: 12px; color: #5a6470; padding: 8px 12px; background: #1e2329; border-left: 2px solid #f0b90b; border-radius: 4px; margin-bottom: 16px; }
  .tickers { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 18px; }
  .ticker-card { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 12px; }
  .ticker-label { color: #f0b90b; font-size: 13px; font-weight: bold; }
  .ticker-name { color: #5a6470; font-size: 11px; }
  .ticker-price { font-size: 16px; font-weight: bold; margin: 6px 0 4px; }
  .ticker-change { font-size: 13px; }
  .ticker-range { font-size: 10px; color: #5a6470; margin-top: 6px; }
  .up { color: #0ecb81; }
  .down { color: #f6465d; }
  .analysis-box { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 16px; }
  .analysis-title { font-size: 11px; color: #f0b90b; letter-spacing: 1px; margin-bottom: 12px; }
  .analysis-body { font-size: 14px; line-height: 1.8; color: #c9d1d9; white-space: pre-wrap; }
  .analysis-footer { font-size: 10px; color: #5a6470; margin-top: 12px; border-top: 1px solid #2b3139; padding-top: 10px; }
  .api-section { background: #1e2329; border: 1px solid #2b3139; border-radius: 6px; padding: 14px; margin-bottom: 18px; }
  .api-section input { width: 100%; background: #0b0e11; border: 1px solid #2b3139; border-radius: 4px; padding: 8px 10px; color: #e2e8f0; font-family: inherit; font-size: 13px; margin-top: 8px; }
  .api-hint { font-size: 11px; color: #5a6470; margin-top: 6px; }
</style>
</head>
